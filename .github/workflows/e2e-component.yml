name: Component E2E

on:
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      pytest_args:
        description: 'Extra pytest args for targeted HAOS E2E iteration'
        type: string
        required: false
        default: ''
      force_local_build:
        description: 'Build the qcow2 locally even on a cache hit'
        type: boolean
        required: false
        default: false

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.14"
  LIBGUESTFS_BACKEND: direct

jobs:
  haos-e2e-embedded:
    name: HAOS E2E Tests (embedded)
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v7

      - name: Compute image cache key
        id: key
        run: |
          esphome_addon_config="$(curl -fsSL https://raw.githubusercontent.com/esphome/home-assistant-addon/main/esphome/config.yaml)"
          esphome_addon_hash="$(
            printf '%s' "$esphome_addon_config" | sha256sum | cut -d' ' -f1 | head -c16
          )"
          esphome_version="$(
            printf '%s\n' "$esphome_addon_config" \
              | awk '/^version:/{gsub(/"/, "", $2); print $2; exit}'
          )"
          hash=$(git ls-tree -r HEAD \
            tests/haos_image_build \
            tests/initial_test_state \
            custom_components/esphome_mcp \
            | { cat; echo "esphome-addon:$esphome_addon_hash"; } \
            | sha256sum | cut -d' ' -f1 | head -c16)
          echo "cache-key=esphome-mcp-haos-image-$hash" >> "$GITHUB_OUTPUT"
          echo "esphome-addon-hash=$esphome_addon_hash" >> "$GITHUB_OUTPUT"
          echo "esphome-version=$esphome_version" >> "$GITHUB_OUTPUT"

      - name: Restore image from cache
        id: restore-cache
        uses: actions/cache/restore@v6
        with:
          path: /tmp/haos-test-image.qcow2
          key: ${{ steps.key.outputs.cache-key }}

      - name: Report image acquisition path
        run: |
          echo "::notice title=HAOS image cache::cache-hit=${{ steps.restore-cache.outputs.cache-hit }} key=${{ steps.key.outputs.cache-key }} esphome-addon-hash=${{ steps.key.outputs.esphome-addon-hash }} esphome-version=${{ steps.key.outputs.esphome-version }}"

      - name: Install QEMU, OVMF, and libguestfs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-utils ovmf xz-utils curl libguestfs-tools
          sudo chmod +r /boot/vmlinuz-* || true

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Free disk space for local image build
        if: steps.restore-cache.outputs.cache-hit != 'true' || github.event.inputs.force_local_build == 'true'
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/share/swift /opt/ghc \
            /usr/local/lib/android /usr/local/.ghcup
          sudo apt-get clean
          docker system prune -af --volumes || true
          df -h /

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache ESPHome host PlatformIO data
        uses: actions/cache@v6
        with:
          path: ~/.esphome-mcp-host-e2e/platformio
          key: esphome-host-device-pio-${{ runner.os }}-${{ steps.key.outputs.esphome-version }}-${{ hashFiles('tests/src/e2e/utilities/esphome_host.py') }}
          restore-keys: |
            esphome-host-device-pio-${{ runner.os }}-${{ steps.key.outputs.esphome-version }}-
            esphome-host-device-pio-${{ runner.os }}-

      - name: Install build-script deps
        if: steps.restore-cache.outputs.cache-hit != 'true' || github.event.inputs.force_local_build == 'true'
        run: python -m pip install -r tests/haos_image_build/requirements.txt

      - name: Build HAOS image locally
        if: steps.restore-cache.outputs.cache-hit != 'true' || github.event.inputs.force_local_build == 'true'
        run: |
          python tests/haos_image_build/build_image.py --verbose \
            --output /tmp/haos-test-image.qcow2

      - name: Save image to cache
        if: steps.restore-cache.outputs.cache-hit != 'true' || github.event.inputs.force_local_build == 'true'
        uses: actions/cache/save@v6
        with:
          path: /tmp/haos-test-image.qcow2
          key: ${{ steps.key.outputs.cache-key }}

      - name: Install test dependencies
        run: python -m pip install -e ".[dev,host-e2e]" "esphome==${{ steps.key.outputs.esphome-version }}"

      - name: Confirm image present
        run: ls -lh /tmp/haos-test-image.qcow2

      - name: Run HAOS embedded component E2E
        run: |
          cd tests
          pytest src/e2e/haos_only/test_embedded_server_haos.py \
            -v --tb=short --maxfail=1 ${{ github.event.inputs.pytest_args }}
        env:
          HAOS_TEST_IMAGE_PATH: /tmp/haos-test-image.qcow2
          HAOS_TEST_MODE: embedded
          HAOS_QEMU_HOST_GATEWAY: 10.0.2.2

      - name: Extract HA diagnostics from booted qcow2
        if: always()
        run: |
          sudo chmod +r /boot/vmlinuz-* || true
          mkdir -p /tmp/haos-embedded-diagnostics
          img=/tmp/haos-test-image.qcow2
          if [ -f "$img" ]; then
            outdir=/tmp/haos-embedded-diagnostics/base
            mkdir -p "$outdir"
            guestfish --ro -a "$img" run \
              : mount /dev/sda8 / \
              : ll /supervisor/homeassistant \
              > "$outdir/config-dir-listing.txt" 2>&1 \
              || echo "directory listing failed"
            guestfish --ro -a "$img" run \
              : mount /dev/sda8 / \
              : tar-out /supervisor/homeassistant/.storage "$outdir/storage.tar" \
              || echo ".storage tar-out failed"
            guestfish --ro -a "$img" run \
              : mount /dev/sda8 / \
              : glob copy-out '/supervisor/homeassistant/*.log*' "$outdir/" \
              || echo "log glob copy failed"
          fi
          ls -laR /tmp/haos-embedded-diagnostics/ || true
          ls -laR /tmp/haos-diagnostics/ || true
          python scripts/redact_diagnostics_secrets.py /tmp/haos-embedded-diagnostics

      - name: Upload HAOS embedded diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: haos-embedded-diagnostics
          path: |
            /tmp/haos-embedded-diagnostics/
            /tmp/haos-diagnostics/
            /tmp/haos-e2e-serial.log
          if-no-files-found: warn
          retention-days: 7
