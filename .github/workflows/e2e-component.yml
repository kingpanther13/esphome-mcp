name: Component E2E

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  component-e2e:
    name: Component E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dev tools
        run: python -m pip install -e ".[dev]"
      - name: Run component e2e lane
        run: pytest -m e2e tests/src/e2e/workflows/embedded
