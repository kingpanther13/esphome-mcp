name: PR Validation

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dev tools
        run: python -m pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check custom_components tests scripts
      - name: Ruff format check
        run: ruff format --check custom_components tests scripts

  dependency-sandbox:
    name: Runtime Dependency Sandbox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Runtime dependency sandbox
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python scripts/check_runtime_dependency_sandbox.py
          compat_ref="$(python scripts/check_runtime_dependency_sandbox.py --print-ha-mcp-ref)"
          gh api \
            -H "Accept: application/vnd.github.raw" \
            "repos/homeassistant-ai/ha-mcp/contents/pyproject.toml?ref=${compat_ref}" \
            > /tmp/ha-mcp-pyproject.toml
          python scripts/check_runtime_dependency_sandbox.py \
            --ha-mcp-pyproject /tmp/ha-mcp-pyproject.toml

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dev tools
        run: python -m pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/src/unit

  release-metadata:
    name: Release Metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Validate release metadata
        run: python scripts/validate_release_metadata.py
      - name: Validate version bump for component changes
        run: python scripts/check_version_bump.py "origin/${{ github.base_ref || 'master' }}"

  host-device-e2e:
    name: ESPHome Host Device E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential
      - name: Cache ESPHome host PlatformIO data
        uses: actions/cache@v6
        with:
          path: ~/.esphome-mcp-host-e2e/platformio
          key: esphome-host-device-pio-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'tests/src/e2e/host_device/**') }}
          restore-keys: |
            esphome-host-device-pio-${{ runner.os }}-
      - name: Install host-device E2E dependencies
        run: python -m pip install -e ".[dev,host-e2e]"
      - name: Run ESPHome host-device E2E
        run: pytest tests/src/e2e/host_device -v --tb=short --maxfail=1
