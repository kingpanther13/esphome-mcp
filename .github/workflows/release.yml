name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, with or without the leading v prefix. Defaults to manifest.json version.
        required: false
        type: string
      dry_run:
        description: Validate the release without creating it.
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    if: github.ref_name == 'master'
    permissions:
      contents: read
    outputs:
      version: ${{ steps.release-version.outputs.version }}
      tag: ${{ steps.release-version.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Resolve release version
        id: release-version
        env:
          REQUESTED_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          requested="${REQUESTED_VERSION:-}"
          if [ -n "$requested" ]; then
            version="${requested#v}"
          else
            version="$(python -c 'import json; from pathlib import Path; print(json.loads(Path("custom_components/esphome_mcp/manifest.json").read_text())["version"])')"
          fi
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Install dev tools
        run: python -m pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check custom_components tests scripts

      - name: Ruff format check
        run: ruff format --check custom_components tests scripts

      - name: Unit tests
        run: pytest tests/src/unit

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

      - name: Hassfest
        uses: home-assistant/actions/hassfest@master

      - name: Validate release metadata
        env:
          VERSION: ${{ steps.release-version.outputs.version }}
        run: python scripts/validate_release_metadata.py "$VERSION"

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.ref_name == 'master' && github.event.inputs.dry_run != 'true' }}
    permissions:
      contents: write
    steps:
      - name: Check existing release
        id: existing-release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Release exists::${TAG} already exists; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.existing-release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          tag="v${version}"
          gh release create "${tag}" \
            --target "${GITHUB_SHA}" \
            --title "${tag}" \
            --notes "Release ${tag} for HACS installation."
