name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, with or without the leading v prefix. Defaults to manifest.json version.
        required: false
        type: string
      dry_run:
        description: Validate the release without creating it.
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    if: github.ref_name == 'master'
    permissions:
      contents: read
    outputs:
      version: ${{ steps.release-version.outputs.version }}
      tag: ${{ steps.release-version.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Resolve release version
        id: release-version
        env:
          REQUESTED_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          requested="${REQUESTED_VERSION:-}"
          if [ -n "$requested" ]; then
            version="${requested#v}"
          else
            version="$(python -c 'import json; from pathlib import Path; print(json.loads(Path("custom_components/esphome_mcp/manifest.json").read_text())["version"])')"
          fi
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Install dev tools
        run: python -m pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check custom_components tests scripts

      - name: Ruff format check
        run: ruff format --check custom_components tests scripts

      - name: Runtime dependency sandbox
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python scripts/check_runtime_dependency_sandbox.py
          compat_ref="$(python scripts/check_runtime_dependency_sandbox.py --print-ha-mcp-ref)"
          gh api \
            -H "Accept: application/vnd.github.raw" \
            "repos/homeassistant-ai/ha-mcp/contents/pyproject.toml?ref=${compat_ref}" \
            > /tmp/ha-mcp-pyproject.toml
          python scripts/check_runtime_dependency_sandbox.py \
            --ha-mcp-pyproject /tmp/ha-mcp-pyproject.toml

      - name: Unit tests
        run: pytest tests/src/unit

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

      - name: Hassfest
        uses: home-assistant/actions/hassfest@master

      - name: Validate release metadata
        env:
          VERSION: ${{ steps.release-version.outputs.version }}
        run: python scripts/validate_release_metadata.py "$VERSION"

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.ref_name == 'master' && github.event.inputs.dry_run != 'true' }}
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Inspect existing release and tag
        id: release-state
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail

          release_error="$(mktemp)"
          if gh api "repos/${GH_REPO}/releases/tags/${TAG}" >/dev/null 2>"$release_error"; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Release exists::${TAG} already exists; skipping publish."
            exit 0
          fi
          if ! grep -q "HTTP 404" "$release_error"; then
            cat "$release_error" >&2
            echo "::error title=GitHub API error::Failed to check whether release ${TAG} exists."
            exit 1
          fi

          tag_error="$(mktemp)"
          if gh api "repos/${GH_REPO}/git/ref/tags/${TAG}" >/dev/null 2>"$tag_error"; then
            echo "::error title=Tag exists without release::${TAG} exists, but no GitHub Release was found for it. Refusing to publish a release for a potentially stale tag."
            exit 1
          fi
          if grep -q "HTTP 404" "$tag_error"; then
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            cat "$tag_error" >&2
            echo "::error title=GitHub API error::Failed to check whether tag ${TAG} exists."
            exit 1
          fi

      - name: Check out release source
        if: steps.release-state.outputs.should_publish == 'true'
        uses: actions/checkout@v7

      - name: Set up Python
        if: steps.release-state.outputs.should_publish == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build release notes from merged pull request
        if: steps.release-state.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "repos/${GH_REPO}/commits/${GITHUB_SHA}/pulls" \
            > /tmp/release-pulls.json
          python scripts/release_notes.py render \
            --pulls-json /tmp/release-pulls.json \
            --sha "${GITHUB_SHA}" \
            --output /tmp/release-notes.md

      - name: Create GitHub release
        if: steps.release-state.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          tag="v${version}"
          gh release create "${tag}" \
            --target "${GITHUB_SHA}" \
            --title "${tag}" \
            --notes-file /tmp/release-notes.md
