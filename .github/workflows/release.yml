name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, with or without the leading v prefix.
        required: true
        type: string
      dry_run:
        description: Validate the release without creating it.
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Validate and publish release
    runs-on: ubuntu-latest
    if: github.ref_name == 'master'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dev tools
        run: python -m pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check custom_components tests scripts

      - name: Ruff format check
        run: ruff format --check custom_components tests scripts

      - name: Unit tests
        run: pytest tests/src/unit

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

      - name: Hassfest
        uses: home-assistant/actions/hassfest@master

      - name: Validate release metadata
        run: python scripts/validate_release_metadata.py "${{ inputs.version }}"

      - name: Create GitHub release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          tag="v${version}"
          gh release create "${tag}" \
            --target "${GITHUB_SHA}" \
            --title "${tag}" \
            --notes "Release ${tag} for HACS installation."
